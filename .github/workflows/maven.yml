# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  # Compile deps we would normally download from jitpack.io which is currently offline
  build-deps:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        repository: 'fun-o-form/java-stream-player-fork'

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn install
      
    # ~/.m2 contains the built jars for java-stream-player-fork. Make this cache
    # available to our next job that actually builds mdp. Eliminates need to publish
    # jars to someplace like maven central. Name the cache after the github run and
    # attempt so we are sure our cache is only used for this specific workflow execution.
    - name: Cache Maven packages
      uses: actions/cache/save@v5
      with:
        path: ~/.m2/repository
        key: m2-${{ github.run_id }}-${{ github.run_attempt }}   

  # Compile the code
  build:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Cache Maven packages
      uses: actions/cache/restore@v5
      with:
        path: ~/.m2/repository
        key: m2-${{ github.run_id }}-${{ github.run_attempt }}

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn install

    - name: Save targets
      uses: actions/upload-artifact@v7
      with:
        name: music-dir-player
        path: |
          ./target/*
          !./target/classes/
          !./target/maven-*/
        if-no-files-found: warn
        retention-days: 0
        compression-level: 0
        overwrite: true
        include-hidden-files: false
